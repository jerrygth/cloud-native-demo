services:

  postgres:
    image: postgres:16-alpine
    container_name: postgres_dev
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    networks:
      - ecommerce-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../postgres-init/init.sh:/docker-entrypoint-initdb.d/init.sh

  # ===================
  # Microservices
  # ===================

  frontend:
    build:
      context: ../../frontend/payment-frontend
      dockerfile: Dockerfile
    container_name: payment-frontend
    ports:
      - "3000:80"                    # Access frontend at http://localhost:3000
    environment:
      NODE_ENV: production
      VITE_API_GATEWAY_URL: ${API_GATEWAY_URL}
      VITE_LOGIN_URL: ${AUTH0_LOGIN_URL}
      VITE_LOGOUT_URL: ${APP_LOGOUT_URL}
    networks:
      - ecommerce-network
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 3

  service-registry:
    build:
      context: ../../
      dockerfile: platform/service-registry/Dockerfile
    container_name: service-registry
    ports:
      - "8761:8761"
    environment:
      SPRING_PROFILES_ACTIVE: local
      EUREKA_INSTANCE_HOSTNAME: service-registry
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "curl", "-f", "-u", "eureka:secret", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  api-gateway:
    build:
      context: ../../
      dockerfile: platform/api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: local
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:secret@service-registry:8761/eureka
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_AUTH0_CLIENT_SECRET: ${AUTH0_CLIENT_SECRET}
      REACT_URL: http://frontend:80
    depends_on:
      service-registry:
        condition: service_healthy
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  user-service:
    build:
      context: ../../
      dockerfile: services/user-service/Dockerfile
    container_name: user-service
    ports:
      - "8086:8086"
    environment:
      SPRING_PROFILES_ACTIVE: local
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:secret@service-registry:8761/eureka
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/users
      SPRING_R2DBC_USERNAME: userservice
      SPRING_R2DBC_PASSWORD: userpass123
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: https://dev-cxy2s4rbkgtrmylk.us.auth0.com/
    depends_on:
      service-registry:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  payment-service:
    build:
      context: ../../
      dockerfile: services/payment-service/src/main/docker/Dockerfile.jvm
    container_name: payment-service
    ports:
      - "8087:8087"
    environment:
      QUARKUS_PROFILE: prod
      # DB
      DB_URL: jdbc:postgresql://postgres:5432/payments
      DB_USER: paymentservice
      DB_PASSWORD: paymentpass123
      # OIDC (Auth0)
      OIDC_AUTH_SERVER_URL: https://dev-cxy2s4rbkgtrmylk.us.auth0.com
      OIDC_CLIENT_ID: ${AUTH0_CLIENT_ID}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET}
      PORT: 8087
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8087/q/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

 # ===================
  # Monitoring (Optional)
  # ===================

  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - ecommerce-network

  grafana:
    image: grafana/grafana:10.2.3
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - ecommerce-network

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:

networks:
  ecommerce-network:
    driver: bridge