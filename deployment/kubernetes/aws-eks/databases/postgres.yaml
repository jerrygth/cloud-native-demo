apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: payments-demo
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: gp3
---
# ConfigMap with init script
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-script
  namespace: payments-demo
data:
  init.sh: |
    #!/bin/bash
    set -e

    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname="$POSTGRES_DB" <<-EOSQL
      CREATE DATABASE user_management;
      CREATE DATABASE payments;

      CREATE USER userservice WITH PASSWORD 'userpass123';
      CREATE USER paymentservice WITH PASSWORD 'paymentpass123';

      GRANT ALL PRIVILEGES ON DATABASE user_management TO userservice;
      GRANT ALL PRIVILEGES ON DATABASE payments TO paymentservice;
    EOSQL

    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname="user_management" <<-EOSQL
      GRANT ALL PRIVILEGES ON DATABASE user_management TO userservice;
      GRANT USAGE, CREATE ON SCHEMA public TO userservice;
    EOSQL

    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname="payments" <<-EOSQL
      GRANT ALL PRIVILEGES ON DATABASE payments TO paymentservice;
      GRANT USAGE, CREATE ON SCHEMA public TO paymentservice;
    EOSQL

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-db
  namespace: payments-demo
spec:
  serviceName: postgres-db
  replicas: 1
  selector:
    matchLabels:
      app: postgres-db
  template:
    metadata:
      labels:
        app: postgres-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: database-credentials
                  key: user-db-username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: database-credentials
                  key: user-db-password
            - name: POSTGRES_DB
              value: "postgres"
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d/init.sh
              subPath: init.sh
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U admin -d postgres
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U admin -d postgres
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
        - name: init-script
          configMap:
            name: postgres-init-script
            defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-db
  namespace: payments-demo
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: postgres-db