apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: payments-demo
data:
  VITE_API_GATEWAY_URL: "http://api-gateway-service:8081"
  VITE_LOGIN_URL: "http://api-gateway-service:8081/oauth2/authorization/auth0"
  VITE_LOGOUT_URL: "http://api-gateway-service:8081/logout"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payflow-frontend
  namespace: payments-demo
  labels:
    app: payflow-frontend
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payflow-frontend
  template:
    metadata:
      labels:
        app: payflow-frontend
        component: frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101    # nginx user in the official nginx:alpine image
        runAsGroup: 101
        fsGroup: 101
      containers:
        - name: nginx
          image: ghcr.io/jerrygth/cloud-native-demo/payment-frontend:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
          env:
           - name: NODE_ENV
             value: "production"
          envFrom:
            - configMapRef:
                name: frontend-config

          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3

          # ── RESOURCES ────────────────────────────────────────────
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

          # ── SECURITY ─────────────────────────────────────────────
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # Nginx needs to write tmp/pid files
            capabilities:
              drop: ["ALL"]

          # ── NGINX CONFIG VOLUME ───────────────────────────────────
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run

      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
        - name: tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  default.conf: |
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;
    
       # ── HEALTH CHECK ─────────────────────────────────────────
        # Used by K8s readiness and liveness probes.
        location /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    
        gzip on;
        gzip_types text/plain text/css application/json application/javascript;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location /api/ {
            proxy_pass http://api-gateway:8081/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

---
apiVersion: v1
kind: Service
metadata:
  name: payment-frontend
  namespace: payments-demo
  labels:
    app: payflow-frontend
    component: frontend
spec:
  type: ClusterIP
  selector:
    app: payflow-frontend
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
---
