apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-registry
  namespace: payments-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-registry
  template:
    metadata:
      labels:
        app: service-registry
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8761"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: service-registry
          image: ghcr.io/jerrygth/cloud-native-demo/service-registry:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8761
              name: http
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "kubernetes"
            - name: EUREKA_INSTANCE_HOSTNAME
              value: "service-registry"
            - name: JAVA_OPTS
              value: "-Xms256m -Xmx512m -XX:+UseZGC"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "768Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8761
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8761
            initialDelaySeconds: 30
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: service-registry
  namespace: payments-demo
spec:
  type: ClusterIP
  ports:
    - port: 8761
      targetPort: 8761
      name: http
  selector:
    app: service-registry