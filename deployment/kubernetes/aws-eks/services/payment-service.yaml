apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: payments-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8087"
        prometheus.io/path: "/q/metrics"
    spec:
      containers:
        - name: payment-service
          image: ghcr.io/jerrygth/cloud-native-demo/payment-service:1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8087
              name: http
          env:
            - name: QUARKUS_PROFILE
              value: "prod"
            - name: DB_URL
              value: "jdbc:postgresql://postgres-db:5432/payments"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: database-credentials
                  key: payment-db-username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: database-credentials
                  key: payment-db-password
            - name: OIDC_AUTH_SERVER_URL
              valueFrom:
                configMapKeyRef:
                  name: auth0-credentials
                  key: auth0.issuer.uri
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: auth0-credentials
                  key: client-id
            - name: RAZORPAY_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: razorpay-credentials
                  key: key_id
            - name: RAZORPAY_KEY_SECRET
              valueFrom:
                secretKeyRef:
                  name: razorpay-credentials
                  key: key_secret
            - name: RAZORPAY_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: razorpay-credentials
                  key: webhook_secret
            - name: QUARKUS_HTTP_PORT
              value: "8087"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8087
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8087
            initialDelaySeconds: 30
            periodSeconds: 5
          startupProbe:
            httpGet:
              path: /q/health/ready
              port: 8087
            failureThreshold: 30
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: payments-demo
spec:
  type: ClusterIP
  ports:
    - port: 8087
      targetPort: 8087
      name: http
  selector:
    app: payment-service
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: payment-service-hpa
  namespace: payments-demo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: payment-service
  minReplicas: 1
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70