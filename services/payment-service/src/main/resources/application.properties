quarkus.application.name=payment-service
quarkus.http.port=8087

# Quarkus Dev Services automatically starts a real PostgreSQL container
# when running in dev mode (./gradlew quarkusDev) — NO docker-compose needed!
%dev.quarkus.datasource.devservices.enabled=false
%dev.quarkus.datasource.devservices.image-name=postgres:16

# ── DATASOURCE ─────────────────────────────────────────────
quarkus.datasource.db-kind=postgresql

# Use env variables ONLY
%prod.quarkus.datasource.jdbc.url=${DB_URL}
%prod.quarkus.datasource.username=${DB_USER}
%prod.quarkus.datasource.password=${DB_PASSWORD}

# Optional default for local dev (if you run without Docker)
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/payment_db
%dev.quarkus.datasource.username=admin
%dev.quarkus.datasource.password=password

# Disable DevServices when running in containers
quarkus.datasource.devservices.enabled=false

# ── HIBERNATE ORM ──────────────────────────────────────────
%dev.quarkus.hibernate-orm.database.generation=update
%prod.quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false
%dev.quarkus.hibernate-orm.log.sql=true

# ── FLYWAY ─────────────────────────────────────────────────
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

# ── SECURITY / OIDC ────────────────────────────────────────
quarkus.oidc.auth-server-url=${OIDC_AUTH_SERVER_URL}
quarkus.oidc.client-id=${OIDC_CLIENT_ID}
quarkus.oidc.application-type=service

# ── PAYMENT CONFIG (choose ONE provider) ───────────────────

# Razorpay (if using)
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}
razorpay.webhook.secret=${RAZORPAY_WEBHOOK_SECRET}


# ── EUREKA ─────────────────────────────────────────────────
quarkus.eureka.enabled=true
quarkus.eureka.service-url.default=http://eureka:secret@service-registry:8761/eureka
quarkus.eureka.prefer-ip-address=true
quarkus.eureka.vip-address=payment-service

# ── SERVER ─────────────────────────────────────────────────
quarkus.http.host=0.0.0.0

# ── LOGGING ──────────────────────────────────────────────────────────────────
# Enable DEBUG logs for the Eureka Extension specifically
quarkus.log.category."com.github.fmcejudo.eureka".level=DEBUG
quarkus.log.category."com.org.dev.payment.service.PaymentService".level=DEBUG

# Optional: See the raw HTTP requests being sent to the Eureka server
# (This shows the JSON payload and the Eureka response codes)
quarkus.log.category."org.jboss.resteasy.reactive.client.logging".level=ERROR
quarkus.log.category."io.quarkus.security".level=DEBUG
quarkus.log.category."io.smallrye.jwt".level=DEBUG
quarkus.log.category."io.smallrye.jwt.auth".level=INFO