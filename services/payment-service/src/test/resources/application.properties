# ═══════════════════════════════════════════════════════════════════════════
# QUARKUS APPLICATION CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════
# KEY DIFFERENCE FROM SPRING BOOT:
#   - Quarkus uses application.properties (not YAML by default, though YAML works)
#   - Properties are COMPILE-TIME processed for native builds
#   - Profile-specific: application-{profile}.properties or %prod.key=value syntax
#   - %dev, %test, %prod prefixes replace Spring's @Profile annotation
# ═══════════════════════════════════════════════════════════════════════════

quarkus.application.name=payment-service
quarkus.http.port=8087

quarkus.datasource.devservices.enabled=false
quarkus.flyway.enabled=false
quarkus.hibernate-orm.enabled=false

# application.properties (test)
quarkus.http.host=127.0.0.1



