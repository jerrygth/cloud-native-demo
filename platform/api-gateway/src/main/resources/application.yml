server:
  port: 8081

#Euereka
eureka:
  client:
    registerWithEureka: true
    serviceUrl:
      defaultZone: ${EUREKA_SERVER:http://eureka:secret@localhost:8761/eureka}
    healthcheck:
      enabled: true
  instance:
    instance-id: ${spring.cloud.client.ip-address}:${spring.application.name}:${server.port}
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: api-gateway
    export:
      prometheus:
        enabled: true
  tracing:
    enabled: true
    sampling:
      probability: 0.2

# Routes
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
         # Payment Service
        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/payments/**
          filters:
            - RemoveRequestHeader=Cookie

       # User Account Service
        - id: useracount
          uri: lb://UserAccountRegistration
          predicates:
            - Path=/api/v1/users/**
          filters:
           - RemoveRequestHeader=Cookie
           - name: CircuitBreaker
             args:
               name: userAccountCircuitBreaker
               fallbackUri: forward:/fallback/user
           - name: Retry
             args:
               retries: 3
               statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE
               methods: GET
               backoff:
                 firstBackoff: 100ms
                 maxBackoff: 500ms
                 factor: 2
        - id: react-frontend
          uri: ${REACT_URL:http://localhost:3000}
          predicates:
            - Path=/**
          filters:
            - SetRequestHeader=Host, localhost:3000


  resilience4j:
    circuitbreaker:
      configs:
        default:
          slidingWindowSize: 10
          minimumNumberOfCalls: 5
          failureRateThreshold: 50
          waitDurationInOpenState: 10s
          permittedNumberOfCallsInHalfOpenState: 3
          automaticTransitionFromOpenToHalfOpenEnabled: true
      instances:
        userAccountCircuitBreaker:
          baseConfig: default
    timelimiter:
      configs:
        default:
          timeoutDuration: 5s
  security:
    oauth2:
      client:
        registration:
          auth0:
            scope: openid,profile,email,profile:read,profile:write,account:delete
            authorization-grant-type: authorization_code
        provider:
          auth0:
            user-name-attribute: email